<!DOCTYPE html>
<html lang="en" class="bg-gray-950 text-gray-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Uptime Dashboard • Last 24h</title>
  <meta http-equiv="refresh" content="300">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            up: '#22c55e',
            down: '#ef4444',
          }
        }
      }
    }
  </script>

  <!-- Chart.js CDN for mini sparkline charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-950 via-slate-950 to-gray-900 p-6 font-sans antialiased">
  <div class="max-w-7xl mx-auto">
    <header class="text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-2 bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
        Website Uptime Monitor
      </h1>
      <p class="text-gray-400 text-lg">Real-time status • Last 24 hours • Updates every 30 min</p>
    </header>

    <div id="dashboard" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <!-- Loading state -->
      <div class="col-span-full text-center py-16 text-gray-500 text-xl animate-pulse">
        Loading dashboard data...
      </div>
    </div>

    <footer class="mt-12 text-center text-sm text-gray-500">
      Powered by GitHub Actions • <a href="https://github.com/940882164/Website-Monitor" target="_blank" class="text-cyan-400 hover:underline">View source</a>
    </footer>
  </div>

  <script>
    // List of sites to monitor (update here if you change in workflow YAML)
    const sites = [
      "https://auapp.app/",                             // ← replaced broken one with working URL
      "https://robot.labelnow.io/",
      "https://aicc.smf.it.com/",
      "https://labelnow.io/"
    ];

    // Fetch with cache busting
    fetch("uptime-log.json?_=" + Date.now())
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}: Could not load uptime-log.json`);
        return r.json();
      })
      .then(data => {
        const now = Date.now();
        const dayAgo = now - 24 * 60 * 60 * 1000;

        // Only last 24 hours
        const recent = data.filter(e => {
          const t = new Date(e.time).getTime();
          return t >= dayAgo && t <= now;
        });

        const container = document.getElementById("dashboard");
        container.innerHTML = "";

        if (recent.length === 0) {
          container.innerHTML = `<p class="col-span-full text-center py-16 text-gray-400 text-xl">No monitoring data in the last 24 hours yet.</p>`;
          return;
        }

        sites.forEach(url => {
          const entries = recent.filter(e => e.site === url);
          const total = entries.length;
          const upCount = entries.filter(e => e.status === "UP").length;
          const uptimePct = total > 0 ? (upCount / total) * 100 : 0;
          const lastStatus = total > 0 ? entries[entries.length - 1].status : "UNKNOWN";
          const avgDuration = total > 0 ? Math.round(entries.reduce((sum, e) => sum + (e.duration_ms || 0), 0) / total) : '—';

          // Chart data: time → status (1=UP, 0=DOWN)
          const labels = entries.map(e => new Date(e.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
          const statusValues = entries.map(e => e.status === "UP" ? 1 : 0);

          const card = document.createElement("div");
          card.className = `
            bg-gray-800/70 backdrop-blur-md border border-gray-700/60 rounded-2xl p-6 shadow-2xl
            hover:shadow-emerald-500/20 hover:border-emerald-500/40 transition-all duration-300
          `;

          card.innerHTML = `
            <h3 class="text-lg font-semibold mb-4 truncate" title="${url}">
              ${url.replace(/^https?:\/\//, '').replace(/^www\./, '')}
            </h3>

            <div class="flex items-center justify-between mb-6">
              <!-- Progress ring -->
              <div class="relative w-28 h-28">
                <svg class="w-full h-full -rotate-90" viewBox="0 0 120 120">
                  <circle cx="60" cy="60" r="52" fill="none" stroke="#1f2937" stroke-width="14" />
                  <circle cx="60" cy="60" r="52" fill="none" stroke="${lastStatus === 'UP' ? '#22c55e' : '#ef4444'}"
                    stroke-width="14" stroke-dasharray="327" stroke-dashoffset="${327 * (1 - uptimePct/100)}"
                    stroke
