<!DOCTYPE html>
<html lang="en" class="bg-gray-950 text-gray-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Uptime Dashboard • Last 24h</title>
  <meta http-equiv="refresh" content="900"> <!-- Changed to 15 minutes (900 seconds) -->

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            up: '#22c55e',
            down: '#ef4444',
          }
        }
      }
    }
  </script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-950 via-slate-950 to-gray-900 p-6 font-sans antialiased">
  <div class="max-w-7xl mx-auto">
    <header class="text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-2 bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
        Website Uptime Monitor
      </h1>
      <p class="text-gray-400 text-lg">Real-time status • Last 24 hours • Updates every 30 min</p>
    </header>

    <div id="dashboard" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <div class="col-span-full text-center py-16 text-gray-500 text-xl animate-pulse">
        Loading dashboard data...
      </div>
    </div>
  </div>

  <script>
    const sites = [
      "https://auapp.app/",
      "https://robot.labelnow.io/",
      "https://aicc.smf.it.com/",
      "https://labelnow.io/"
    ];

    console.log("Dashboard script started. Fetching uptime-log.json...");

    fetch("uptime-log.json?_=" + Date.now() + "&nocache=" + Math.random())
      .then(r => {
        console.log("Fetch status:", r.status, "OK:", r.ok);
        if (!r.ok) throw new Error(`HTTP ${r.status}: Could not load uptime-log.json`);
        return r.json();
      })
      .then(data => {
        console.log("JSON loaded. Total entries:", data.length);
        if (data.length > 0) console.log("Latest time:", data[data.length-1].time);

        const now = Date.now();
        const dayAgo = now - 24 * 60 * 60 * 1000;

        const recent = data.filter(e => {
          if (!e?.time) return false;
          const t = new Date(e.time).getTime();
          return !isNaN(t) && t >= dayAgo && t <= now;
        });

        console.log("Recent (24h) entries:", recent.length);

        const container = document.getElementById("dashboard");
        container.innerHTML = "";

        if (recent.length === 0) {
          container.innerHTML = `<p class="col-span-full text-center py-16 text-yellow-400 text-xl">No data in last 24h yet (check time filter or logs)</p>`;
          return;
        }

        sites.forEach(url => {
          const entries = recent.filter(e => e.site === url);
          const total = entries.length;
          const upCount = entries.filter(e => e.status === "UP").length;
          const uptimePct = total > 0 ? (upCount / total) * 100 : 0;
          const lastStatus = total > 0 ? entries[entries.length - 1].status : "UNKNOWN";
          const avgDuration = total > 0 ? Math.round(entries.reduce((s, e) => s + (Number(e.duration_ms) || 0), 0) / total) : '—';

          const labels = entries.map(e => new Date(e.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
          const statusValues = entries.map(e => e.status === "UP" ? 1 : 0);

          const card = document.createElement("div");
          card.className = `
            bg-gray-800/70 backdrop-blur-md border border-gray-700/60 rounded-2xl p-6 shadow-2xl
            hover:shadow-emerald-500/20 hover:border-emerald-500/40 transition-all duration-300
          `;

          card.innerHTML = `
            <h3 class="text-lg font-semibold mb-4 truncate" title="${url}">
              ${url.replace(/^https?:\/\//, '').replace(/^www\./, '')}
            </h3>

            <div class="flex items-center justify-between mb-6">
              <div class="relative w-32 h-32">
                <svg class="w-full h-full" viewBox="0 0 120 120"> <!-- Removed -rotate-90 for standard clockwise from right -->
                  <circle cx="60" cy="60" r="54" fill="none" stroke="#1f2937" stroke-width="12" />
                  <circle cx="60" cy="60" r="54" fill="none" 
                    stroke="${lastStatus === 'UP' ? '#22c55e' : '#ef4444'}"
                    stroke-width="12" 
                    stroke-dasharray="339" 
                    stroke-dashoffset="${339 - (339 * uptimePct / 100)}" <!-- Adjusted offset for correct clockwise fill -->
                    stroke-linecap="round" 
                    class="transition-all duration-1000 ease-out" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                  <div class="text-3xl font-bold">${Math.round(uptimePct)}</div>
                  <div class="text-xs text-gray-400">%</div>
                </div>
              </div>

              <div class="text-center">
                <div class="text-4xl font-bold ${lastStatus === 'UP' ? 'text-up drop-shadow-[0_0_8px_#22c55e]' : 'text-down drop-shadow-[0_0_8px_#ef4444]'}">
                  ${lastStatus}
                </div>
                <div class="text-xs text-gray-500 mt-1">Last check</div>
              </div>
            </div>

            <div class="h-20 mb-4">
              <canvas id="spark-${btoa(url).slice(0,12)}"></canvas>
            </div>

            <div class="text-center text-sm text-gray-400">
              ${upCount} / ${total} checks • Avg: ${avgDuration} ms
            </div>
          `;

          container.appendChild(card);

          // Sparkline chart
          const ctx = document.getElementById(`spark-${btoa(url).slice(0,12)}`)?.getContext('2d');
          if (ctx) {
            new Chart(ctx, {
              type: 'line',
              data: {
                labels: labels.length ? labels : Array(5).fill(''),
                datasets: [{
                  data: statusValues.length ? statusValues : Array(5).fill(0),
                  borderColor: lastStatus === 'UP' ? '#22c55e' : '#ef4444',
                  backgroundColor: lastStatus === 'UP' ? 'rgba(34,197,94,0.18)' : 'rgba(239,68,68,0.18)',
                  fill: true,
                  tension: 0.3,
                  pointRadius: 0,
                  borderWidth: 2
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: { x: { display: false }, y: { min: -0.1, max: 1.1, display: false } },
                animation: { duration: 1200 }
              }
            });
          }
        });
      })
      .catch(err => {
        console.error("Dashboard error:", err);
        document.getElementById("dashboard").innerHTML = `
          <div class="col-span-full text-center py-16 text-red-400 text-xl">
            Failed to load data: ${err.message}
          </div>
        `;
      });
  </script>
</body>
</html>
