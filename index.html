<!DOCTYPE html>
<html>
<head>
<title>Website Monitoring Dashboard (Last 24h)</title>
<meta http-equiv="refresh" content="300">
<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
h1{
  margin-top:30px;
}
.container{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-top:40px;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:250px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}
.up{color:#22c55e;font-weight:bold;}
.down{color:#ef4444;font-weight:bold;}
</style>
</head>

<body>

<h1>Website Monitoring (Last 24 Hours)</h1>

<div class="container">
  <div class="card">
    <h3>Site 1</h3>
    <p id="site1">Loading...</p>
  </div>
  <div class="card">
    <h3>Site 2</h3>
    <p id="site2">Loading...</p>
  </div>
  <div class="card">
    <h3>Site 3</h3>
    <p id="site3">Loading...</p>
  </div>
  <div class="card">
    <h3>Site 4</h3>
    <p id="site4">Loading...</p>
  </div>
</div>

<script>
fetch("uptime-log.json")
.then(response => response.json())
.then(data => {
  const sites = [
    "https://940882164.github.io/portfolio-test-tracker2/",
    "https://940882164.github.io/portfolio-test-tracker/",
    "https://example.com",
    "https://google.com"
  ];

  sites.forEach((url, i) => {
    let total = 0;
    let up = 0;
    let lastStatus = "DOWN";

    data.forEach(entry => {
      if(entry.site === url){
        total++;
        if(entry.status === "UP") up++;
        lastStatus = entry.status;
      }
    });

    const uptimePercent = total > 0 ? ((up / total) * 100).toFixed(2) : "0.00";
    const el = document.getElementById("site"+(i+1));
    el.innerHTML = `<span class="${lastStatus.toLowerCase()}">${lastStatus}</span> | Uptime: ${uptimePercent}% (${up}/${total})`;
  });
});
</script>

</body>
</html>
