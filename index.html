<!DOCTYPE html>
<html>
<head>
<title>Website Monitoring Dashboard (Last 24h)</title>
<meta http-equiv="refresh" content="300">
<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
h1{
  margin-top:30px;
}
.container{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-top:40px;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:350px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}
.up{color:#22c55e;font-weight:bold;}
.down{color:#ef4444;font-weight:bold;}
</style>
</head>

<body>

<h1>Website Monitoring Dashboard (Last 24 Hours)</h1>

<div class="container" id="dashboard">
  Loading...
</div>

<script>
const sites = [
  "https://940882164.github.io/portfolio-test-tracker2/",
  "https://robot.labelnow.io/",
  "https://aicc.smf.it.com/",
  "https://labelnow.io/"
];

fetch("uptime-log.json")
.then(response => response.json())
.then(data => {

  let results = [];

  sites.forEach(url => {
    let total = 0;
    let up = 0;
    let lastStatus = "DOWN";

    data.forEach(entry => {
      if(entry.site === url){
        total++;
        if(entry.status === "UP") up++;
        lastStatus = entry.status;
      }
    });

    let uptimePercent = total > 0 ? ((up/total)*100).toFixed(2) : 0;
    results.push({url, lastStatus, uptimePercent, up, total});
  });

  // Sort by highest uptime first
  results.sort((a,b) => b.uptimePercent - a.uptimePercent);

  // Render
  const container = document.getElementById("dashboard");
  container.innerHTML = "";

  results.forEach(r => {
    let card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>${r.url}</h3>
      <p><span class="${r.lastStatus.toLowerCase()}">${r.lastStatus}</span> | Uptime: ${r.uptimePercent}% (${r.up}/${r.total})</p>
    `;
    container.appendChild(card);
  });
});
</script>

</body>
</html>
