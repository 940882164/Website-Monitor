name: Website Monitoring

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        url: [
          "https://940882164.github.io/portfolio-test-tracker2/",
          "https://940882164.github.io/portfolio-test-tracker/",
          "https://another-site.com",
          "https://yetanother-site.com"
        ]
    steps:
      - name: Check Website ${{ matrix.url }}
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "${{ matrix.url }}")
          echo "Checking ${{ matrix.url }} - Status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Website DOWN! ${{ matrix.url }} Status: $STATUS"
            exit 1
          else
            echo "✅ Website OK - ${{ matrix.url }}"
          fi
