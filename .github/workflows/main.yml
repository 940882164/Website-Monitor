name: Website Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check Website 1
        run: |
          URL="https://aicc.smf.it.com"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)

          echo "Website 1 status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Website 1 is DOWN"
            exit 1
          fi

      - name: Check Website 2
        run: |
          URL="https://940882164.github.io/portfolio-test-tracker2/"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)

          echo "Website 2 status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Website 2 is DOWN"
            exit 1
          fi

      - name: Check Website 3
        run: |
          URL="https://auapp.app/"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)

          echo "Website 3 status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Website 3 is DOWN"
            exit 1
          fi

      - name: Check Website 4
        run: |
          URL="https://robot.labelnow.io/"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)

          echo "Website 4 status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Website 4 is DOWN"
            exit 1
          fi
