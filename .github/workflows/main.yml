name: Website Uptime Monitor + Email on Down

on:
  schedule:
    - cron: "*/30 * * * *"    # every 30 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check websites & build log
        id: check
        run: |
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://robot.labelnow.io/"
            "https://aicc.smf.it.com/"
            "https://labelnow.io/"
          )

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LOG_FILE="uptime-log.json"

          # Create empty array if file doesn't exist
          if [ ! -f "$LOG_FILE" ]; then
            echo "[]" > "$LOG_FILE"
          fi

          FAILED_SITES=()
          STATUS_LINES=""

          for SITE in "${WEBSITES[@]}"; do
            START=$(date +%s%3N)
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --retry 1 "$SITE") || HTTP_STATUS="000"
            END=$(date +%s%3N)
            DURATION=$((END - START))

            if [ "$HTTP_STATUS" = "200" ]; then
              STATE="UP"
            else
              STATE="DOWN"
              FAILED_SITES+=("$SITE → DOWN (HTTP $HTTP_STATUS, ${DURATION}ms)")
            fi

            STATUS_LINES="$STATUS_LINES\n$SITE → $STATE (HTTP $HTTP_STATUS, ${DURATION}ms)"

            # Append entry to JSON log
            jq --arg site "$SITE" \
               --arg status "$STATE" \
               --arg time "$TIMESTAMP" \
               --argjson duration "$DURATION" \
               '. += [{"site": $site, "status": $status, "time": $time, "duration_ms": $duration}]' \
               "$LOG_FILE" > tmp.json && mv tmp.json "$LOG_FILE"
          done

          # Set step outputs
          echo "all_status<<EOF" >> $GITHUB_OUTPUT
          echo -e "$STATUS_LINES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ ${#FAILED_SITES[@]} -gt 0 ]; then
            echo "failed_sites<<EOF" >> $GITHUB_OUTPUT
            printf "%s\n" "${FAILED_SITES[@]}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_failures=true" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated log (always)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uptime-log.json
          git commit -m "Update uptime log - $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send email alert if any site is DOWN
        if: always() && steps.check.outputs.has_failures == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}           # your.email@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}       # 16-character app password
          subject: "[DOWN ALERT] Website Monitor - $(date -u +'%Y-%m-%d %H:%M UTC')"
          to: ${{ secrets.GMAIL_USERNAME }}                 # send to yourself (or change to another address)
          from: Website Uptime Monitor <${{ secrets.GMAIL_USERNAME }}>
          body: |
            🚨 ALERT: One or more monitored websites are DOWN! 🚨

            Failed sites:
            ${{ steps.check.outputs.failed_sites }}

            Full status from this check:
            ${{ steps.check.outputs.all_status }}

            📊 Dashboard: https://940882164.github.io/Website-Monitor/
            🔍 Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            (Automated check every 30 minutes)
          content_type: text/plain
