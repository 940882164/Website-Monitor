name: Website Monitor Multiple

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false    # run all URLs independently
      matrix:
        url: [
          "https://auapp.app/",
          "http://44.212.11.40:5555/",
          "http://34.231.218.46:5001/",
          "https://labelnow.io/",
        ]
    steps:
      - name: Check Website ${{ matrix.url }}
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "${{ matrix.url }}")
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Website DOWN! ${{ matrix.url }} Status: $STATUS"
            exit 1
          fi
