name: Website Uptime Logger with Email

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:

jobs:
  log-uptime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check Websites
        id: check_sites
        run: |
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://robot.labelnow.io/"
            "https://aicc.smf.it.com/"
            "https://labelnow.io/"
          )

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LOG_FILE="uptime-log.json"

          if [ ! -f "$LOG_FILE" ]; then
            echo "[]" > "$LOG_FILE"
          fi

          STATUS_REPORT=""
          FAILED_SITES=""

          for SITE in "${WEBSITES[@]}"; do
            START=$(date +%s%3N)
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$SITE")
            END=$(date +%s%3N)
            DURATION=$((END-START))

            if [ "$HTTP_STATUS" = "200" ]; then
              STATE="UP"
            else
              STATE="DOWN"
              FAILED_SITES="$FAILED_SITES"$'\n'"$SITE = $STATE | Checked in ${DURATION} ms"
            fi

            STATUS_REPORT="$STATUS_REPORT"$'\n'"$SITE = $STATE | Checked in ${DURATION} ms"

            TMP_FILE=$(mktemp)
            jq ". + [{\"site\":\"$SITE\",\"status\":\"$STATE\",\"time\":\"$TIMESTAMP\",\"duration_ms\":$DURATION}]" "$LOG_FILE" > "$TMP_FILE" && mv "$TMP_FILE" "$LOG_FILE"
          done

          echo "STATUS_REPORT<<EOF" >> $GITHUB_OUTPUT
          echo "$STATUS_REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "FAILED_SITES<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILED_SITES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit and push uptime log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uptime-log.json
          git commit -m "Update uptime log"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Email on Failures
        if: steps.check_sites.outputs.FAILED_SITES != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}  # use your App Password
          to: "youremail@gmail.com"
          from: "Website Monitor <youremail@gmail.com>"
          subject: "Website Uptime Alert: Some sites failed"
          body: |
            The following websites are DOWN as of ${{ github.run_started_at }}:
            ${{ steps.check_sites.outputs.FAILED_SITES }}
            Full status report:
            ${{ steps.check_sites.outputs.STATUS_REPORT }}
