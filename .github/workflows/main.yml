name: Website Uptime Logger

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:

jobs:
  log-uptime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Log website uptime
        run: |
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://robot.labelnow.io/"
            "https://aicc.smf.it.com/"
            "https://labelnow.io/"
          )

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LOG_FILE="uptime-log.json"

          # Create file if not exists
          if [ ! -f "$LOG_FILE" ]; then
            echo "[]" > "$LOG_FILE"
          fi

          for SITE in "${WEBSITES[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$SITE")
            if [ "$STATUS" -eq 200 ]; then
              STATE="UP"
            else
              STATE="DOWN"
            fi

            # Append new entry
            TMP=$(mktemp)
            jq ". + [{\"site\":\"$SITE\",\"status\":\"$STATE\",\"time\":\"$TIMESTAMP\"}]" "$LOG_FILE" > "$TMP" && mv "$TMP" "$LOG_FILE"

            echo "$SITE status: $STATE"
          done
