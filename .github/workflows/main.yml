name: Website Uptime Logger

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:

jobs:
  log-uptime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check Websites
        run: |
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://robot.labelnow.io/"
            "https://aicc.smf.it.com/"
            "https://labelnow.io/"
          )

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LOG_FILE="uptime-log.json"

          # Create file if missing
          if [ ! -f "$LOG_FILE" ]; then
            echo "[]" > "$LOG_FILE"
          fi

          FAIL=0
          STATUS_REPORT=""
          FAILED_SITES=""

          for SITE in "${WEBSITES[@]}"; do
            START=$(date +%s%3N)
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$SITE")
            END=$(date +%s%3N)
            DURATION=$((END-START))

            if [ "$HTTP_STATUS" = "200" ]; then
              STATE="UP"
            else
              STATE="DOWN"
              FAIL=1
              FAILED_SITES="$FAILED_SITES"$'\n'"$SITE = $STATE | Checked in ${DURATION} ms"
            fi

            STATUS_REPORT="$STATUS_REPORT"$'\n'"$SITE = $STATE | Checked in ${DURATION} ms"

            # Append log entry for dashboard
            TMP_FILE=$(mktemp)
            jq ". + [{\"site\":\"$SITE\",\"status\":\"$STATE\",\"time\":\"$TIMESTAMP\",\"duration_ms\":$DURATION}]" "$LOG_FILE" > "$TMP_FILE" && mv "$TMP_FILE" "$LOG_FILE"
          done

          echo "=== STATUS REPORT ==="
          echo "$STATUS_REPORT"

          if [ $FAIL -eq 1 ]; then
            echo "=== FAILED SITES ==="
            echo "$FAILED_SITES"
            exit 1
          fi
