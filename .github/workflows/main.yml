name: Website Uptime Logger

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:

jobs:
  log-uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # will use GITHUB_TOKEN for push

      - name: Check Website Status
        shell: bash
        run: |
          # List of websites to monitor
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://940882164.github.io/portfolio-test-tracker/"
            "https://example.com"
            "https://github.com"
          )

          # Timestamp for this check
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{ \"time\": \"$TIMESTAMP\"" > status.json

          # Check each website
          for SITE in "${WEBSITES[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$SITE" || echo 0)
            if [ "$STATUS" -eq 200 ]; then
              STATUS_TEXT="UP"
            else
              STATUS_TEXT="DOWN"
            fi
            echo ", \"$SITE\": \"$STATUS_TEXT\"" >> status.json
          done

          echo "}" >> status.json

      - name: Merge with existing log
        shell: bash
        run: |
          if [ ! -f uptime-log.json ]; then
            echo "[]" > uptime-log.json
          fi
          TMP=$(mktemp)
          jq '. + [input]' uptime-log.json status.json > "$TMP"
          mv "$TMP" uptime-log.json
          # Keep only last 48 entries (24 hours at 30-min intervals)
          TMP2=$(mktemp)
          jq '.[-48:]' uptime-log.json > "$TMP2"
          mv "$TMP2" uptime-log.json

      - name: Commit and Push log
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Align local branch with remote
          git fetch origin main
          git checkout -B main origin/main

          # Add log and commit only if there are changes
          git add uptime-log.json
          git diff-index --quiet HEAD || git commit -m "Update uptime log"

          # Force push updated main branch
          git push -f https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY} HEAD:main
