name: Website Uptime Logger

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:

jobs:
  log-uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check Website Status
        shell: bash
        run: |
          # List of websites to monitor (full URLs)
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://940882164.github.io/portfolio-test-tracker/"
          )

          # Get current timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{ \"time\": \"$TIMESTAMP\"" > status.json

          # Check each website
          for SITE in "${WEBSITES[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$SITE")
            if [ "$STATUS" -eq 200 ]; then
              STATUS_TEXT="UP"
            else
              STATUS_TEXT="DOWN"
            fi
            echo ", \"$SITE\": \"$STATUS_TEXT\"" >> status.json
          done

          echo "}" >> status.json

      - name: Merge with existing log
        shell: bash
        run: |
          if [ ! -f uptime-log.json ]; then
            echo "[]" > uptime-log.json
          fi
          TMP=$(mktemp)
          jq '. + [input]' uptime-log.json status.json > "$TMP"
          mv "$TMP" uptime-log.json
          TMP2=$(mktemp)
          jq '.[-48:]' uptime-log.json > "$TMP2"
          mv "$TMP2" uptime-log.json

      - name: Commit and Push log
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uptime-log.json
          git commit -m "Update uptime log" || echo "No changes to commit"
          git push
