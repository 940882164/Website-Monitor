name: Website Monitor

on:
  schedule:
    - cron: "* * * * *"   # every 1 minute
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check Website Status
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://940882164.github.io/portfolio-test-tracker2/)
          if [ "$STATUS" -ne 200 ]; then
            echo "Website DOWN! Status: $STATUS"
            exit 1
          fi

      - name: Check Keyword
        run: |
          PAGE=$(curl -s https://940882164.github.io/portfolio-test-tracker2/)
          if [[ "$PAGE" != *"Portfolio"* ]]; then
            echo "Keyword 'Portfolio' missing! Website might be broken."
            exit 1
          fi

      - name: Check Response Time
        run: |
          TIME=$(curl -o /dev/null -s -w "%{time_total}" https://940882164.github.io/portfolio-test-tracker2/)
          if (( $(echo "$TIME > 3" | bc -l) )); then
            echo "Website slow! Response time: $TIME seconds"
            exit 1
          fi
