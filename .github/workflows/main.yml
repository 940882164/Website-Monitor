name: Website Uptime Logger

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log-uptime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Website Status
        run: |
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://940882164.github.io/portfolio-test-tracker/"
            "https://example.com"
            "https://github.com"
          )

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{ \"time\": \"$TIMESTAMP\"" > status.json

          for SITE in "${WEBSITES[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$SITE" || echo 0)

            if [ "$STATUS" -eq 200 ]; then
              STATE="UP"
            else
              STATE="DOWN"
            fi

            echo ", \"$SITE\": \"$STATE\"" >> status.json
          done

          echo "}" >> status.json

      - name: Update Log
        run: |
          if [ ! -f uptime-log.json ]; then
            echo "[]" > uptime-log.json
          fi

          jq '. + [input]' uptime-log.json status.json > temp.json
          mv temp.json uptime-log.json

          # keep only last 48 entries (24 hours)
          jq '.[-48:]' uptime-log.json > temp.json
          mv temp.json uptime-log.json

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add uptime-log.json
          git commit -m "Update uptime log" || echo "No changes"

          git pull --rebase
          git push
