name: Website Uptime Logger

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log-uptime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Check websites and build log
        run: |
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://robot.labelnow.io/"
            "https://aicc.smf.it.com/"
            "https://labelnow.io/"
          )

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "[" > uptime-log.json

          FIRST=true

          for URL in "${WEBSITES[@]}"
          do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL")

            if [ "$STATUS" = "200" ]; then
              STATE="UP"
            else
              STATE="DOWN"
            fi

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> uptime-log.json
            fi

            echo "{ \"time\": \"$TIMESTAMP\", \"site\": \"$URL\", \"status\": \"$STATE\" }" >> uptime-log.json

            echo "$URL = $STATE"
          done

          echo "]" >> uptime-log.json

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"

          git add uptime-log.json
          git commit -m "Update uptime log" || echo "No changes"
          git pull --rebase origin main
          git push
