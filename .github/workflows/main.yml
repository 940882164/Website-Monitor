name: Website Monitor Multiple

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (change back to */59 if preferred)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # Continue checking all URLs even if one fails
      matrix:
        url: [
          "https://940882164.github.io/portfolio-test-tracker2/",
          "https://robot.labelnow.io/",
          "https://aicc.smf.it.com/",
          "https://labelnow.io/"
        ]
    steps:
      - name: Check Website ${{ matrix.url }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --retry 1 "${{ matrix.url }}") || STATUS="000"
          echo "Checking ${{ matrix.url }} → HTTP $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Website DOWN! ${{ matrix.url }} Status: $STATUS"
            exit 1
          else
            echo "✅ Website UP! ${{ matrix.url }} Status: $STATUS"
          fi
