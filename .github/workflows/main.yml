name: Website Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check websites
        run: |
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://940882164.github.io/portfolio-test-tracker/"
            "https://example.com"
            "https://github.com"
          )

          echo "Website Status Check"
          echo "Time: $(date -u)"

          for SITE in "${WEBSITES[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$SITE" || echo 0)

            if [ "$STATUS" -eq 200 ]; then
              echo "$SITE → UP"
            else
              echo "$SITE → DOWN"
            fi
          done
