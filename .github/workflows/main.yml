name: Website Uptime Logger

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log-uptime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check websites and build status
        run: |
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://940882164.github.io/portfolio-test-tracker/"
            "https://example.com"
            "https://github.com"
          )

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ ! -f uptime-log.json ]; then
            echo "[]" > uptime-log.json
          fi

          echo "{ \"time\": \"$TIMESTAMP\"" > status.json

          for SITE in "${WEBSITES[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$SITE" || echo 0)

            if [ "$STATUS" -eq 200 ]; then
              RESULT="UP"
            else
              RESULT="DOWN"
            fi

            echo ", \"$SITE\": \"$RESULT\"" >> status.json
          done

          echo "}" >> status.json

      - name: Update uptime log
        run: |
          jq '. + [input]' uptime-log.json status.json > temp.json
          mv temp.json uptime-log.json

          jq '.[-48:]' uptime-log.json > temp2.json
          mv temp2.json uptime-log.json

      - name: Commit and push log
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add uptime-log.json
          git commit -m "Update uptime log" || echo "Nothing to commit"

          git push origin HEAD:main --force-with-lease
