name: Website Uptime Monitor + Built-in Notification on Down

on:
  schedule:
    - cron: "*/30 * * * *"    # every 30 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check websites & build log
        id: check
        run: |
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://robot.labelnow.io/"
            "https://aicc.smf.it.com/"
            "https://labelnow.io/"
          )

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LOG_FILE="uptime-log.json"

          # Create empty array if file doesn't exist
          if [ ! -f "$LOG_FILE" ]; then
            echo "[]" > "$LOG_FILE"
          fi

          FAILED_SITES=()
          STATUS_LINES=""

          for SITE in "${WEBSITES[@]}"; do
            START=$(date +%s%3N)
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --retry 1 "$SITE") || HTTP_STATUS="000"
            END=$(date +%s%3N)
            DURATION=$((END - START))

            if [ "$HTTP_STATUS" = "200" ]; then
              STATE="UP"
            else
              STATE="DOWN"
              FAILED_SITES+=("$SITE (HTTP $HTTP_STATUS, ${DURATION}ms)")
            fi

            STATUS_LINES="$STATUS_LINES\n$SITE → $STATE (HTTP $HTTP_STATUS, ${DURATION}ms)"

            # Append entry to JSON log
            jq --arg site "$SITE" \
               --arg status "$STATE" \
               --arg time "$TIMESTAMP" \
               --argjson duration "$DURATION" \
               '. += [{"site": $site, "status": $status, "time": $time, "duration_ms": $duration}]' \
               "$LOG_FILE" > tmp.json && mv tmp.json "$LOG_FILE"
          done

          # Print status for logs (visible in workflow run)
          echo "Status this run:"
          echo -e "$STATUS_LINES"

          # If any DOWN → fail the job so built-in email is sent
          if [ ${#FAILED_SITES[@]} -gt 0 ]; then
            echo "ALERT: Some sites DOWN → forcing failure for notification"
            echo "Failed: ${FAILED_SITES[*]}"
            exit 1
          fi

      - name: Commit and push updated log (always, even on DOWN/failure)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uptime-log.json
          git commit -m "Update uptime log - $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
