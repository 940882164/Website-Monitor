name: Website Monitor Multiple

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check Websites
        id: check
        run: |
          WEBSITES=(
            "https://940882164.github.io/portfolio-test-tracker2/"
            "https://940882164.github.io/portfolio-test-tracker/"
            "https://another-site.com"
            "https://yetanother-site.com"
          )

          FAILED_URLS=""
          for URL in "${WEBSITES[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL")
            echo "$URL Status: $STATUS"
            if [ "$STATUS" -ne 200 ]; then
              FAILED_URLS="$FAILED_URLS\n$URL (Status: $STATUS)"
            fi
          done

          echo "FAILED_URLS<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FAILED_URLS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Email if Any Failures
        if: ${{ steps.check.outputs.FAILED_URLS != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Website Monitor Alert: Some sites failed"
          to: "person1@example.com,person2@example.com,person3@example.com"
          from: "Website Monitor <your-email@gmail.com>"
          body: |
            The following websites failed the last check:
            ${{ steps.check.outputs.FAILED_URLS }}
            Check immediately!
